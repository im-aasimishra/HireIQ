version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hireiq-postgres
    environment:
      POSTGRES_USER: hireiq_admin
      POSTGRES_PASSWORD: SecretPassword123
      POSTGRES_DB: hireiq_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hireiq_admin -d hireiq_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: hireiq-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: hireiq-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: hireiq-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.19-community
    container_name: hireiq-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/SecretPassword123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "SecretPassword123", "RETURN 1"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hireiq-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/backend
    working_dir: /backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://hireiq_admin:SecretPassword123@postgres:5432/hireiq_prod
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SecretPassword123
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=hireiq_admin
      - POSTGRES_PASSWORD=SecretPassword123
      - POSTGRES_DB=hireiq_prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=hireiq
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_AUTH=neo4j/SecretPassword123
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      neo4j: { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:
  neo4j_data: